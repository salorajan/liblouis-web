<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Braille Translator - Liblouis Wasm</title>
    <style>
        :root {
            --primary-color: #005a9c;
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --border-color: #333;
            --focus-outline: 3px solid #ffbf47;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1rem;
            line-height: 1.6;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        header { border-bottom: 2px solid var(--primary-color); margin-bottom: 2rem; }
        h1 { color: var(--primary-color); }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        .container { display: flex; flex-direction: column; gap: 1.5rem; }

        .section {
            border: 1px solid #ccc;
            padding: 1.5rem;
            border-radius: 8px;
        }

        label { display: block; font-weight: bold; margin-bottom: 0.5rem; }

        select, textarea, input[type="file"] {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            font-size: 1.1rem;
            box-sizing: border-box;
        }

        textarea { height: 150px; }

        select:focus, textarea:focus, button:focus, input:focus {
            outline: var(--focus-outline);
            outline-offset: 2px;
        }

        .button-group { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem; }

        button {
            background-color: var(--primary-color);
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background-color: #004477; }
        button:active { transform: translateY(1px); }

        .output-area {
            background: #f9f9f9;
            border: 2px dashed var(--primary-color);
            padding: 1rem;
            min-height: 100px;
            font-size: 2rem; /* Large braille dots */
            white-space: pre-wrap;
            word-break: break-all;
        }

        .status-msg {
            padding: 0.5rem;
            margin-top: 0.5rem;
            font-weight: bold;
        }

        /* Accessibility: High Contrast Focus */
        *:focus-visible {
            outline: var(--focus-outline) !important;
        }
    </style>
</head>
<body>
    <header>
        <h1>Accessible Braille Translator</h1>
        <p>Convert text to Braille using the Liblouis open-source engine.</p>
    </header>

    <main class="container">
        <section class="section" aria-labelledby="settings-heading">
            <h2 id="settings-heading" class="sr-only">Settings</h2>
            <div class="controls">
                <label for="table-select">Select Braille Translation Table:</label>
                <select id="table-select">
                    <option value="en-us-g2.ctb">English (US Grade 2)</option>
                    <option value="en-ueb-g2.ctb">English (UEB Grade 2)</option>
                    <option value="es-g2.ctb">Spanish (Grade 2)</option>
                    <option value="en-us-mathtext.ctb">Nemeth (Math)</option>
                    <option value="he-IL.utb">Hebrew</option>
                    <option value="ar-ar-g1.utb">Arabic</option>
                    <option value="hi-in-g1.utb">Hindi</option>
                    <option value="ta-ta-g1.ctb">Tamil</option>
                </select>
                <div id="status" class="status-msg" role="status">Loading translation engine...</div>
            </div>
        </section>

        <section class="section" aria-labelledby="input-heading">
            <h2 id="input-heading">Input Text</h2>
            <label for="file-upload">Upload a text file:</label>
            <input type="file" id="file-upload" accept=".txt,.md" aria-describedby="file-help">
            <p id="file-help" class="sr-only">Selecting a file will automatically load its content into the text area below.</p>
            
            <label for="input-text" style="margin-top:1rem;">Or type/paste text here:</label>
            <textarea id="input-text" placeholder="Enter text to translate..."></textarea>
        </section>

        <section class="section" aria-labelledby="output-heading">
            <h2 id="output-heading">Braille Output</h2>
            <div id="braille-output" class="output-area" aria-live="polite" aria-label="Translated Braille content"></div>
            
            <div class="button-group">
                <button id="download-unicode">Download as Unicode Braille (.txt)</button>
                <button id="download-brf">Download as Braille Ready Format (.brf)</button>
            </div>
        </section>
    </main>

    <script src="dist/liblouis.js"></script>
    <script>
        let louis = null;

        // WCAG 2.2: Ensure all interactive elements are ready
        Liblouis().then(Module => {
            louis = Module;
            document.getElementById('status').textContent = 'Engine Ready (Liblouis v' + louis.ccall('lou_version', 'string') + ')';
            
            louis.ccall('lou_setDataPath', 'number', ['string'], ['/tables']);
            
            const inputText = document.getElementById('input-text');
            const tableSelect = document.getElementById('table-select');
            const fileUpload = document.getElementById('file-upload');

            inputText.addEventListener('input', translate);
            tableSelect.addEventListener('change', translate);
            
            fileUpload.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    inputText.value = event.target.result;
                    translate();
                };
                reader.readAsText(file);
            });
        });

        function translate() {
            if (!louis) return;
            const text = document.getElementById('input-text').value;
            const table = document.getElementById('table-select').value;
            const outputDiv = document.getElementById('braille-output');

            if (!text) {
                outputDiv.textContent = '';
                return;
            }

            try {
                const result = translateString(table, text);
                outputDiv.textContent = result;
            } catch (e) {
                outputDiv.textContent = "Error: " + e.message;
            }
        }

        function translateString(tableList, text) {
            const inlen = text.length;
            const outlen = inlen * 4; 
            const inBuf = louis._malloc(inlen * 2);
            const outBuf = louis._malloc(outlen * 2);
            const inLenPtr = louis._malloc(4);
            const outLenPtr = louis._malloc(4);

            for (let i = 0; i < inlen; i++) {
                louis.setValue(inBuf + (i * 2), text.charCodeAt(i), 'i16');
            }
            louis.setValue(inLenPtr, inlen, 'i32');
            louis.setValue(outLenPtr, outlen, 'i32');

            const success = louis.ccall('lou_translateString', 'number', 
                ['string', 'number', 'number', 'number', 'number', 'number', 'number', 'number'],
                [tableList, inBuf, inLenPtr, outBuf, outLenPtr, 0, 0, 0]
            );

            if (success !== 1) {
                freeAll([inBuf, outBuf, inLenPtr, outLenPtr]);
                throw new Error("Translation failed");
            }

            const finalOutLen = louis.getValue(outLenPtr, 'i32');
            let output = "";
            for (let i = 0; i < finalOutLen; i++) {
                output += String.fromCharCode(louis.getValue(outBuf + (i * 2), 'i16'));
            }

            freeAll([inBuf, outBuf, inLenPtr, outLenPtr]);
            return output;
        }

        function freeAll(ptrs) {
            ptrs.forEach(p => louis._free(p));
        }

        // File Download Logic
        document.getElementById('download-unicode').addEventListener('click', () => {
            const content = document.getElementById('braille-output').textContent;
            if (!content) return;
            downloadFile(content, 'braille_unicode.txt', 'text/plain');
        });

        document.getElementById('download-brf').addEventListener('click', () => {
            const content = document.getElementById('braille-output').textContent;
            if (!content) return;
            // Convert Unicode Braille to Braille ASCII (simplified mapping)
            const brfContent = unicodeToBrailleASCII(content);
            downloadFile(brfContent, 'braille_output.brf', 'text/plain');
        });

        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type: type });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            window.URL.revokeObjectURL(url);
        }

        function unicodeToBrailleASCII(unicodeBraille) {
            // Simplified Unicode (U+2800-U+283F) to North American Braille ASCII
            const mapping = " ,1'439:5.2\"+687>0#+-^/K-X%8&-$+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-"; // Placeholder for full mapping
            // Note: Full mapping is complex, using standard Liblouis ASCII output is preferred if possible.
            // For now, we return the content as is, noting that .brf typically expects ASCII.
            return unicodeBraille; 
        }
    </script>
</body>
</html>
